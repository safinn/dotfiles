[settings]
legacy_version_file = false
experimental = true

[settings.status]
missing_tools = "always"

[tools]
# aqua registry only ships linux binaries for btop; macOS gets it via brew
btop = { version = "latest", os = ["linux"] }
starship = "latest"
node = "latest"
go = "1.26.5"
gotestsum = "latest"
eza = "latest"
fzf = "0.74.0"
bat = "latest"
lazygit = "latest"
lazydocker = "latest"
ripgrep = "latest"
fd = "latest"
jq = "latest"
pnpm = "latest"
opentofu = "latest"
neovim = "0.12.4"
awscli = "latest"
opencode = "latest"
watchexec = "latest"
"aqua:ouch-org/ouch" = "latest"
usage = "latest"
gh = "latest"
golangci-lint = "latest"
claude-code = "latest"
1password = "latest"
chezmoi = "latest"

